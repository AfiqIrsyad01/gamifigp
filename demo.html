<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AF Computer Centre - Demo SPA</title>
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #ff5722, #ff9800);
            --secondary-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --dark-bg: #121212;
            --glass-bg: rgba(255, 255, 255, 0.95);
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Navbar Styling */
        .navbar {
            background: rgba(33, 37, 41, 0.9) !important;
            backdrop-filter: blur(10px);
            padding: 1rem 0;
            transition: var(--transition);
        }

        .navbar-brand {
            font-weight: 700;
            letter-spacing: 1px;
            color: #ff5722 !important;
        }

        .nav-link {
            font-weight: 500;
            padding: 0.5rem 1rem !important;
            transition: var(--transition);
        }

        .nav-link:hover {
            color: #ff9800 !important;
        }

        /* Hero Section */
        .hero-section {
            background: url('https://images.unsplash.com/photo-1593642702821-c8da6771f0c6?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80') center/cover no-repeat;
            height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            position: relative;
            margin-bottom: 3rem;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
        }

        .hero-content {
            position: relative;
            z-index: 1;
        }

        .hero-content h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        /* Card Styling */
        .premium-card {
            background: var(--glass-bg);
            border: none;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            transition: var(--transition);
            overflow: hidden;
            height: 100%;
        }

        .premium-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        .card-img-top {
            height: 200px;
            object-fit: cover;
        }

        /* Button Styling */
        .btn-premium {
            background: var(--primary-gradient);
            border: none;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(255, 87, 34, 0.3);
        }

        .btn-premium:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 87, 34, 0.4);
            color: white;
        }

        .btn-outline-premium {
            border: 2px solid #ff5722;
            color: #ff5722;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            transition: var(--transition);
        }

        .btn-outline-premium:hover {
            background: var(--primary-gradient);
            color: white;
            border-color: transparent;
        }

        /* Main Container */
        #app {
            flex: 1;
        }

        /* Gamification Styles */
        .stats-badge {
            background: var(--secondary-gradient);
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .progress {
            height: 10px;
            border-radius: 5px;
            margin-bottom: 1rem;
        }

        .level-up {
            color: #ff9800;
            font-weight: 700;
            font-size: 1.2rem;
        }

        /* Footer */
        footer {
            background: #212529;
            color: white;
            padding: 3rem 0;
        }

        /* Notifications */
        .notification-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            background: white;
            padding: 1rem 2rem;
            border-radius: 10px;
            box-shadow: var(--card-shadow);
            border-left: 5px solid #ff5722;
            display: none;
        }

        /* Form Styling */
        .form-control {
            border-radius: 10px;
            padding: 0.8rem 1.2rem;
            border: 1px solid #ddd;
            transition: var(--transition);
        }

        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(255, 87, 34, 0.1);
            border-color: #ff5722;
        }

        /* Dashboard Sidebar */
        .dash-sidebar {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: var(--card-shadow);
        }

        .dash-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 1rem;
            border-radius: 10px;
            color: #666;
            text-decoration: none;
            transition: var(--transition);
        }

        .dash-link:hover, .dash-link.active {
            background: #fff3e0;
            color: #ff5722;
        }

        /* Admin UI */
        .admin-stat {
            background: white;
            padding: 1.5rem;
            border-radius: 15px;
            border-bottom: 4px solid #ff5722;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="javascript:void(0)" onclick="router.navigate('/')">
                <i class="fas fa-desktop me-2"></i>AF COMPUTER CENTRE
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navItems">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navItems">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="javascript:void(0)" onclick="router.navigate('/')">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="javascript:void(0)" onclick="router.navigate('/products')">Products</a></li>
                    <div id="authLinks" class="d-flex align-items-center">
                        <!-- Dynamic Links -->
                    </div>
                </ul>
            </div>
        </div>
    </nav>

    <!-- App Container -->
    <div id="app" class="animate__animated animate__fadeIn">
        <!-- Content injected here -->
    </div>

    <!-- Notification Toast -->
    <div id="notification" class="notification-toast animate__animated">
        <span id="notificationMsg"></span>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="row">
                <div class="col-md-4 mb-4">
                    <h5>AF Computer Centre</h5>
                    <p class="text-muted">Empowering your digital life with the best hardware and service in Kuantan.</p>
                </div>
                <div class="col-md-4 mb-4">
                    <h5>Quick Links</h5>
                    <ul class="list-unstyled">
                        <li><a href="#" class="text-muted text-decoration-none">Privacy Policy</a></li>
                        <li><a href="#" class="text-muted text-decoration-none">Terms of Service</a></li>
                        <li><a href="#" class="text-muted text-decoration-none">Support</a></li>
                    </ul>
                </div>
                <div class="col-md-4 mb-4">
                    <h5>Connect With Us</h5>
                    <div class="d-flex gap-3">
                        <a href="#" class="text-white fs-4"><i class="fab fa-facebook"></i></a>
                        <a href="#" class="text-white fs-4"><i class="fab fa-instagram"></i></a>
                        <a href="https://wa.me/60165424645" class="text-white fs-4"><i class="fab fa-whatsapp"></i></a>
                    </div>
                </div>
            </div>
            <hr class="mt-4 border-secondary">
            <p class="text-center text-muted mb-0">© 2025 AF Computer Centre. Built as a Premium SPA Demo.</p>
        </div>
    </footer>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // --- Data Layer (Simulating Database with LocalStorage) ---
        const DB = {
            init: function() {
                if (!localStorage.getItem('gamifi_products')) {
                    const products = [
                        { id: 1, name: 'MSI Katana 15', price: 4599, category: 'Gaming Laptop', stock: 5, image: 'https://images.unsplash.com/photo-1603302576837-37561b2e2302?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=80', description: 'Intel Core i7-13620H, RTX 4060, 16GB RAM, 512GB SSD', featured: true },
                        { id: 2, name: 'Dell Vostro 3520', price: 2299, category: 'Business Laptop', stock: 10, image: 'https://images.unsplash.com/photo-1541807084-5c52b6b3adef?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=80', description: 'Intel Core i5, 8GB RAM, 256GB SSD', featured: true },
                        { id: 3, name: 'Custom Gaming PC Rig', price: 5999, category: 'PC Fullset', stock: 3, image: 'https://images.unsplash.com/photo-1587202372775-e229f172b9d7?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=80', description: 'Ryzen 7 7800X3D, RTX 4070 Ti Super, 32GB RGB RAM', featured: true }
                    ];
                    localStorage.setItem('gamifi_products', JSON.stringify(products));
                }
                if (!localStorage.getItem('gamifi_users')) {
                    const users = [
                        { id: 1, email: 'admin@afcc.com', password: 'admin', name: 'Admin User', role: 'admin', points: 0, level: 10, exp: 0 },
                        { id: 2, email: 'user@afcc.com', password: 'user', name: 'Alif Faiz', role: 'user', points: 1500, level: 5, exp: 450 }
                    ];
                    localStorage.setItem('gamifi_users', JSON.stringify(users));
                }
                if (!localStorage.getItem('gamifi_news')) {
                    const news = [
                        { id: 1, title: 'Grand Re-opening!', content: 'Join us this Saturday for exclusive deals and free merchandise!', date: new Date().toLocaleDateString() },
                        { id: 2, title: 'RTX 50-Series Coming Soon', content: 'Pre-order your next-gen GPU now and get bonus loyalty points.', date: new Date().toLocaleDateString() }
                    ];
                    localStorage.setItem('gamifi_news', JSON.stringify(news));
                }
                if (!localStorage.getItem('gamifi_orders')) {
                    localStorage.setItem('gamifi_orders', JSON.stringify([]));
                }
                if (!localStorage.getItem('gamifi_rewards')) {
                    const rewards = [
                        { id: 1, name: 'RM50 Discount Voucher', cost: 1000, type: 'discount' },
                        { id: 2, name: 'Gaming Mousepad', cost: 500, type: 'item' },
                        { id: 3, name: 'Free PC Cleaning Service', cost: 2000, type: 'service' }
                    ];
                    localStorage.setItem('gamifi_rewards', JSON.stringify(rewards));
                }
            },
            get: (key) => JSON.parse(localStorage.getItem('gamifi_' + key)),
            set: (key, data) => localStorage.setItem('gamifi_' + key, JSON.stringify(data)),
            currentUser: () => JSON.parse(sessionStorage.getItem('gamifi_login'))
        };

        // --- Core Application Logic ---
        const App = {
            notify: function(msg, type = 'success') {
                const toast = document.getElementById('notification');
                const msgSpan = document.getElementById('notificationMsg');
                toast.style.display = 'block';
                toast.classList.add('animate__slideInRight');
                msgSpan.innerText = msg;
                toast.style.borderLeftColor = type === 'success' ? '#4caf50' : '#f44336';
                
                setTimeout(() => {
                    toast.classList.replace('animate__slideInRight', 'animate__slideOutRight');
                    setTimeout(() => {
                        toast.style.display = 'none';
                        toast.classList.remove('animate__slideOutRight');
                    }, 500);
                }, 3000);
            },

            updateNavbar: function() {
                const user = DB.currentUser();
                const container = document.getElementById('authLinks');
                if (user) {
                    container.innerHTML = `
                        <li class="nav-item ms-lg-3">
                            <a class="nav-link btn-premium text-white px-4" href="javascript:void(0)" onclick="router.navigate('/dashboard')">
                                <i class="fas fa-user-circle me-1"></i> Dashboard
                            </a>
                        </li>
                        <li class="nav-item ms-lg-2">
                            <a class="nav-link text-danger" href="javascript:void(0)" onclick="App.logout()">
                                <i class="fas fa-sign-out-alt"></i>
                            </a>
                        </li>
                    `;
                } else {
                    container.innerHTML = `
                        <li class="nav-item ms-lg-3"><a class="nav-link" href="javascript:void(0)" onclick="router.navigate('/login')">Login</a></li>
                        <li class="nav-item ms-lg-2"><a class="nav-link btn-premium text-white px-4" href="javascript:void(0)" onclick="router.navigate('/register')">Join Now</a></li>
                    `;
                }
            },

            logout: function() {
                sessionStorage.removeItem('gamifi_login');
                this.updateNavbar();
                this.notify('Logged out successfully!');
                router.navigate('/');
            },

            addPoints: function(amount) {
                const current = DB.currentUser();
                if (!current) return;
                const users = DB.get('users');
                const idx = users.findIndex(u => u.id === current.id);
                users[idx].points += amount;
                users[idx].exp += (amount / 2);
                
                // Level up logic
                if (users[idx].exp >= users[idx].level * 200) {
                    users[idx].level++;
                    users[idx].exp = 0;
                    this.notify(`LEVEL UP! You are now Level ${users[idx].level}!`, 'success');
                }

                DB.set('users', users);
                sessionStorage.setItem('gamifi_login', JSON.stringify(users[idx]));
            }
        };

        // --- Router System ---
        const router = {
            routes: {},
            navigate: function(path) {
                window.location.hash = path;
                this.render(path);
            },
            render: function(path) {
                const app = document.getElementById('app');
                app.classList.remove('animate__fadeIn');
                void app.offsetWidth;
                app.classList.add('animate__fadeIn');
                
                // Active link management
                document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));

                if (path === '/' || path === '') this.viewHome();
                else if (path === '/products') this.viewProducts();
                else if (path === '/login') this.viewLogin();
                else if (path === '/register') this.viewRegister();
                else if (path === '/dashboard') this.viewDashboard();
                else if (path === '/admin') this.viewAdmin();
                else if (path.startsWith('/product/')) this.viewProductDetail(path.split('/')[2]);
                
                window.scrollTo(0,0);
            },

            // --- View Generators ---

            viewHome: function() {
                const news = DB.get('news');
                const products = DB.get('products').filter(p => p.featured);
                
                document.getElementById('app').innerHTML = `
                    <section class="hero-section">
                        <div class="hero-overlay"></div>
                        <div class="hero-content container">
                            <h1 class="animate__animated animate__fadeInUp">AF COMPUTER CENTRE</h1>
                            <p class="lead animate__animated animate__fadeInUp animate__delay-1s">Elevate Your Gaming & Productivity Experience</p>
                            <div class="mt-4 animate__animated animate__fadeInUp animate__delay-2s">
                                <button class="btn btn-premium me-3" onclick="router.navigate('/products')">Explore Products</button>
                                <button class="btn btn-outline-light rounded-pill px-4" onclick="document.getElementById('about').scrollIntoView()">About Us</button>
                            </div>
                        </div>
                    </section>

                    <div class="container my-5">
                        <div class="text-center mb-5">
                            <h2 class="fw-bold">Featured Tech</h2>
                            <p class="text-muted">Hand-picked gear for true enthusiasts</p>
                        </div>
                        <div class="row g-4">
                            ${products.map(p => `
                                <div class="col-md-4">
                                    <div class="premium-card card">
                                        <img src="${p.image}" class="card-img-top" alt="${p.name}">
                                        <div class="card-body">
                                            <span class="badge bg-warning text-dark mb-2">Featured</span>
                                            <h5 class="card-title fw-bold">${p.name}</h5>
                                            <p class="card-text text-muted small">${p.description}</p>
                                            <div class="d-flex justify-content-between align-items-center">
                                                <span class="fs-5 fw-bold text-orange">RM${p.price.toLocaleString()}</span>
                                                <button class="btn btn-premium btn-sm" onclick="router.navigate('/product/${p.id}')">View Details</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="container my-5 py-5">
                        <div class="row align-items-center">
                            <div class="col-lg-6">
                                <h2 class="fw-bold mb-4">Why Join AF Loyalty?</h2>
                                <div class="d-flex gap-4 mb-4">
                                    <div class="fs-1 text-orange"><i class="fas fa-coins"></i></div>
                                    <div>
                                        <h5 class="fw-bold">Earn Points</h5>
                                        <p class="text-muted">Get points for every purchase and review you submit.</p>
                                    </div>
                                </div>
                                <div class="d-flex gap-4 mb-4">
                                    <div class="fs-1 text-primary"><i class="fas fa-rocket"></i></div>
                                    <div>
                                        <h5 class="fw-bold">Level Up</h5>
                                        <p class="text-muted">Unlock exclusive discounts and early access to sales.</p>
                                    </div>
                                </div>
                                <button class="btn btn-premium" onclick="router.navigate('/register')">Get Started Now</button>
                            </div>
                            <div class="col-lg-6">
                                <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?ixlib=rb-1.2.1&auto=format&fit=crop&w=1000&q=80" class="img-fluid rounded-4 shadow" alt="Gamification">
                            </div>
                        </div>
                    </div>

                    <div id="about" class="bg-dark text-white py-5">
                        <div class="container py-5">
                            <div class="row">
                                <div class="col-md-8 mx-auto text-center">
                                    <h2 class="fw-bold mb-4">Visit Our Store</h2>
                                    <p class="lead mb-4">A9, Lorong Bukit Setongkol Perdana 1, Kuantan, Pahang</p>
                                    <div class="ratio ratio-21x9 rounded-4 overflow-hidden shadow">
                                        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3980.999523246628!2d103.3065102!3d3.8101824!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x31c8bb229dc181db%3A0x842bf29ffdbd9255!2sAF%20COMPUTER%20CENTRE!5e0!3m2!1sen!2smy!4v1751269082866!5m2!1sen!2smy" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            viewProducts: function() {
                const products = DB.get('products');
                document.getElementById('app').innerHTML = `
                    <div class="container my-5">
                        <div class="d-flex justify-content-between align-items-center mb-5">
                            <div>
                                <h1 class="fw-bold">Product Catalog</h1>
                                <p class="text-muted">Discover our latest inventory</p>
                            </div>
                            <div class="d-flex gap-3">
                                <select class="form-select rounded-pill px-4" id="catFilter" onchange="router.filterProducts(this.value)">
                                    <option value="All">All Categories</option>
                                    <option value="Gaming Laptop">Gaming Laptops</option>
                                    <option value="Business Laptop">Business Laptops</option>
                                    <option value="PC Fullset">Full PC Sets</option>
                                </select>
                            </div>
                        </div>
                        <div class="row g-4" id="productsGrid">
                            ${products.map(p => this.productCardTemplate(p)).join('')}
                        </div>
                    </div>
                `;
            },

            productCardTemplate: function(p) {
                return `
                    <div class="col-md-4 product-item" data-category="${p.category}">
                        <div class="premium-card card animate__animated animate__fadeIn">
                            <img src="${p.image}" class="card-img-top" alt="${p.name}">
                            <div class="card-body">
                                <span class="badge bg-light text-dark shadow-sm mb-2">${p.category}</span>
                                <h5 class="card-title fw-bold">${p.name}</h5>
                                <p class="card-text text-muted small">${p.description.substring(0, 80)}...</p>
                                <div class="d-flex justify-content-between align-items-center">
                                    <span class="fs-5 fw-bold text-orange">RM${p.price.toLocaleString()}</span>
                                    <button class="btn btn-premium btn-sm" onclick="router.navigate('/product/${p.id}')">View Details</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            filterProducts: function(cat) {
                const items = document.querySelectorAll('.product-item');
                items.forEach(item => {
                    if (cat === 'All' || item.dataset.category === cat) {
                        item.style.display = 'block';
                    } else {
                        item.style.display = 'none';
                    }
                });
            },

            viewProductDetail: function(id) {
                const product = DB.get('products').find(p => p.id == id);
                if (!product) return this.viewHome();

                document.getElementById('app').innerHTML = `
                    <div class="container my-5 py-5">
                        <div class="row g-5">
                            <div class="col-lg-6">
                                <img src="${product.image}" class="img-fluid rounded-4 shadow-lg" alt="${product.name}">
                            </div>
                            <div class="col-lg-6">
                                <nav aria-label="breadcrumb">
                                  <ol class="breadcrumb">
                                    <li class="breadcrumb-item"><a href="#" onclick="router.navigate('/products')">Products</a></li>
                                    <li class="breadcrumb-item active">${product.category}</li>
                                  </ol>
                                </nav>
                                <h1 class="fw-bold mb-3">${product.name}</h1>
                                <div class="d-flex align-items-center gap-3 mb-4">
                                    <span class="fs-2 fw-bold text-orange">RM${product.price.toLocaleString()}</span>
                                    <span class="badge bg-success">In Stock (${product.stock})</span>
                                </div>
                                <hr>
                                <h5 class="fw-bold">Description</h5>
                                <p class="text-muted mb-4">${product.description}</p>
                                <div class="d-grid gap-3">
                                    <button class="btn btn-premium py-3 fs-5" onclick="router.placeOrder(${product.id})">
                                        <i class="fas fa-shopping-cart me-2"></i> Book & Order Now
                                    </button>
                                    <p class="text-center text-muted small"><i class="fas fa-gift me-1"></i> Earn 500 points with this purchase!</p>
                                </div>
                                <div class="mt-5">
                                    <div class="admin-stat p-3 d-flex align-items-center gap-3">
                                        <div class="fs-1 text-orange"><i class="fas fa-shield-alt"></i></div>
                                        <div>
                                            <h6 class="mb-0 fw-bold">Official Warranty</h6>
                                            <small class="text-muted">1 to 3 Years Manufacturer Warranty</small>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            placeOrder: function(pid) {
                const user = DB.currentUser();
                if (!user) {
                    App.notify('Please login to place an order!', 'error');
                    router.navigate('/login');
                    return;
                }
                
                const product = DB.get('products').find(p => p.id == pid);
                const orders = DB.get('orders');
                const newOrder = {
                    id: Date.now(),
                    userId: user.id,
                    productId: product.id,
                    productName: product.name,
                    price: product.price,
                    status: 'Pending Payment',
                    date: new Date().toLocaleString()
                };
                orders.push(newOrder);
                DB.set('orders', orders);
                
                // Reward points
                App.addPoints(200);
                App.notify('Order placed successfully! 200 Loyalty Points added.', 'success');
                router.navigate('/dashboard');
            },

            viewLogin: function() {
                document.getElementById('app').innerHTML = `
                    <div class="container my-5 py-5">
                        <div class="row justify-content-center">
                            <div class="col-md-5">
                                <div class="premium-card p-5 animate__animated animate__fadeInUp">
                                    <div class="text-center mb-4">
                                        <i class="fas fa-user-circle fs-1 text-orange mb-3"></i>
                                        <h2 class="fw-bold">Welcome Back</h2>
                                        <p class="text-muted">Login to access your rewards</p>
                                    </div>
                                    <form onsubmit="router.handleLogin(event)">
                                        <div class="mb-3">
                                            <label class="form-label">Email Address</label>
                                            <input type="email" class="form-control" id="loginEmail" placeholder="admin@afcc.com" required>
                                        </div>
                                        <div class="mb-4">
                                            <label class="form-label">Password</label>
                                            <input type="password" class="form-control" id="loginPass" placeholder="..." required>
                                        </div>
                                        <button type="submit" class="btn btn-premium w-100 py-3 mb-3">Login</button>
                                        <div class="text-center">
                                            <span class="text-muted">Don't have an account?</span> 
                                            <a href="javascript:void(0)" onclick="router.navigate('/register')" class="text-orange fw-bold text-decoration-none">Register</a>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            handleLogin: function(e) {
                e.preventDefault();
                const email = document.getElementById('loginEmail').value;
                const pass = document.getElementById('loginPass').value;
                const users = DB.get('users');
                const user = users.find(u => u.email === email && u.password === pass);

                if (user) {
                    sessionStorage.setItem('gamifi_login', JSON.stringify(user));
                    App.updateNavbar();
                    App.notify(`Welcome back, ${user.name}!`);
                    router.navigate('/dashboard');
                } else {
                    App.notify('Invalid email or password', 'error');
                }
            },

            viewRegister: function() {
                document.getElementById('app').innerHTML = `
                    <div class="container my-5 py-5">
                        <div class="row justify-content-center">
                            <div class="col-md-6">
                                <div class="premium-card p-5 animate__animated animate__fadeInUp">
                                    <div class="text-center mb-4">
                                        <h2 class="fw-bold">Join the Elite</h2>
                                        <p class="text-muted">Start earning points with every purchase</p>
                                    </div>
                                    <form onsubmit="router.handleRegister(event)">
                                        <div class="row">
                                            <div class="col-md-12 mb-3">
                                                <label class="form-label">Full Name</label>
                                                <input type="text" class="form-control" id="regName" required>
                                            </div>
                                            <div class="col-md-12 mb-3">
                                                <label class="form-label">Email</label>
                                                <input type="email" class="form-control" id="regEmail" required>
                                            </div>
                                            <div class="col-md-12 mb-4">
                                                <label class="form-label">Password</label>
                                                <input type="password" class="form-control" id="regPass" required>
                                            </div>
                                        </div>
                                        <button type="submit" class="btn btn-premium w-100 py-3">Create Account</button>
                                        <p class="text-center mt-3 text-muted">By signing up, you agree to our terms.</p>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            handleRegister: function(e) {
                e.preventDefault();
                const users = DB.get('users');
                const email = document.getElementById('regEmail').value;
                if (users.some(u => u.email === email)) {
                    App.notify('Email already exists!', 'error');
                    return;
                }
                const newUser = {
                    id: Date.now(),
                    name: document.getElementById('regName').value,
                    email: email,
                    password: document.getElementById('regPass').value,
                    role: 'user',
                    points: 500, // Signup bonus
                    level: 1,
                    exp: 0
                };
                users.push(newUser);
                DB.set('users', users);
                App.notify('Registration successful! 500 points added.');
                router.navigate('/login');
            },

            viewDashboard: function() {
                const user = DB.currentUser();
                if (!user) return this.viewLogin();
                if (user.role === 'admin') return this.viewAdmin();

                const orders = DB.get('orders').filter(o => o.userId === user.id);
                const rewards = DB.get('rewards');

                document.getElementById('app').innerHTML = `
                    <div class="container my-5">
                        <div class="row g-4">
                            <!-- Sidebar -->
                            <div class="col-lg-3">
                                <div class="dash-sidebar text-center">
                                    <div class="mb-4">
                                        <img src="https://ui-avatars.com/api/?name=${user.name}&background=ff5722&color=fff" class="rounded-circle shadow mb-3" width="100">
                                        <h5 class="fw-bold mb-0">${user.name}</h5>
                                        <small class="text-muted">Member since 2025</small>
                                    </div>
                                    <div class="stats-badge mb-3">
                                       <i class="fas fa-crown"></i> Level ${user.level}
                                    </div>
                                    <div class="px-3 mb-4">
                                        <div class="d-flex justify-content-between small mb-1">
                                            <span>Experience</span>
                                            <span>${user.exp} / ${user.level * 200}</span>
                                        </div>
                                        <div class="progress">
                                            <div class="progress-bar bg-warning" style="width: ${(user.exp / (user.level * 200)) * 100}%"></div>
                                        </div>
                                    </div>
                                    <div class="nav flex-column gap-2 text-start">
                                        <a href="#" class="dash-link active"><i class="fas fa-th-large"></i> Overview</a>
                                        <a href="#" class="dash-link"><i class="fas fa-shopping-bag"></i> My Orders</a>
                                        <a href="#" class="dash-link"><i class="fas fa-gift"></i> Rewards</a>
                                        <a href="#" class="dash-link text-danger" onclick="App.logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
                                    </div>
                                </div>
                            </div>

                            <!-- Main Content -->
                            <div class="col-lg-9">
                                <div class="row g-4 mb-4">
                                    <div class="col-md-6">
                                        <div class="admin-stat bg-white shadow-sm p-4 d-flex justify-content-between align-items-center">
                                            <div>
                                                <h6 class="text-muted">Total Points</h6>
                                                <h2 class="fw-bold mb-0 text-orange">${user.points} <i class="fas fa-coins ms-1"></i></h2>
                                            </div>
                                            <div class="fs-1 text-orange opacity-25"><i class="fas fa-wallet"></i></div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="admin-stat bg-white shadow-sm p-4 d-flex justify-content-between align-items-center" style="border-color: #4facfe">
                                            <div>
                                                <h6 class="text-muted">Total Orders</h6>
                                                <h2 class="fw-bold mb-0 text-primary">${orders.length}</h2>
                                            </div>
                                            <div class="fs-1 text-primary opacity-25"><i class="fas fa-box-open"></i></div>
                                        </div>
                                    </div>
                                </div>

                                <div class="premium-card p-4 mb-4">
                                    <h5 class="fw-bold mb-4">Recent Activity</h5>
                                    <div class="table-responsive">
                                        <table class="table align-middle">
                                            <thead class="table-light">
                                                <tr>
                                                    <th>Product</th>
                                                    <th>Date</th>
                                                    <th>Status</th>
                                                    <th>Amount</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                ${orders.length ? orders.map(o => `
                                                    <tr>
                                                        <td class="fw-bold">${o.productName}</td>
                                                        <td>${o.date}</td>
                                                        <td><span class="badge bg-soft-warning text-warning border border-warning">${o.status}</span></td>
                                                        <td class="fw-bold text-orange">RM${o.price.toLocaleString()}</td>
                                                    </tr>
                                                `).join('') : '<tr><td colspan="4" class="text-center text-muted py-4">No recent orders.</td></tr>'}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                <div class="premium-card p-4">
                                    <h5 class="fw-bold mb-4">Available Rewards</h5>
                                    <div class="row g-3">
                                        ${rewards.map(r => `
                                            <div class="col-md-4">
                                                <div class="p-3 border rounded-4 text-center">
                                                    <div class="fs-2 text-orange mb-2"><i class="fas fa-gift"></i></div>
                                                    <h6 class="fw-bold">${r.name}</h6>
                                                    <p class="small text-muted mb-3">${r.cost} Points</p>
                                                    <button class="btn btn-sm btn-outline-premium w-100" 
                                                        onclick="router.redeemReward(${r.id})" 
                                                        ${user.points < r.cost ? 'disabled' : ''}>
                                                        ${user.points < r.cost ? 'Not Enough Points' : 'Redeem Now'}
                                                    </button>
                                                </div>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            redeemReward: function(rid) {
                const reward = DB.get('rewards').find(r => r.id === rid);
                const user = DB.currentUser();
                if (user.points >= reward.cost) {
                    const users = DB.get('users');
                    const idx = users.findIndex(u => u.id === user.id);
                    users[idx].points -= reward.cost;
                    DB.set('users', users);
                    sessionStorage.setItem('gamifi_login', JSON.stringify(users[idx]));
                    App.notify(`Successfully redeemed ${reward.name}! Our team will contact you.`, 'success');
                    this.viewDashboard();
                }
            },

            viewAdmin: function() {
                const user = DB.currentUser();
                if (!user || user.role !== 'admin') return this.viewLogin();

                const products = DB.get('products');
                const orders = DB.get('orders');
                const users = DB.get('users').filter(u => u.role === 'user');

                document.getElementById('app').innerHTML = `
                    <div class="container my-5">
                        <div class="d-flex justify-content-between align-items-center mb-5">
                            <div>
                                <h1 class="fw-bold">Admin Command Centre</h1>
                                <p class="text-muted">Monitor and manage your operations</p>
                            </div>
                            <button class="btn btn-premium" onclick="router.navigate('/dashboard')"><i class="fas fa-sync me-2"></i> Refresh Data</button>
                        </div>

                        <div class="row g-4 mb-5">
                            <div class="col-md-3">
                                <div class="admin-stat p-4">
                                    <h6 class="text-muted">Total Revenue</h6>
                                    <h2 class="fw-bold mb-0">RM${orders.reduce((a, b) => a + b.price, 0).toLocaleString()}</h2>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="admin-stat p-4" style="border-color: #4caf50">
                                    <h6 class="text-muted">Orders</h6>
                                    <h2 class="fw-bold mb-0">${orders.length}</h2>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="admin-stat p-4" style="border-color: #2196f3">
                                    <h6 class="text-muted">Customers</h6>
                                    <h2 class="fw-bold mb-0">${users.length}</h2>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="admin-stat p-4" style="border-color: #9c27b0">
                                    <h6 class="text-muted">Inventory</h6>
                                    <h2 class="fw-bold mb-0">${products.length}</h2>
                                </div>
                            </div>
                        </div>

                        <div class="row g-4">
                            <div class="col-md-8">
                                <div class="premium-card p-4">
                                    <h5 class="fw-bold mb-4">Inventory Management</h5>
                                    <div class="table-responsive">
                                        <table class="table align-middle">
                                            <thead>
                                                <tr>
                                                    <th>Product</th>
                                                    <th>Price</th>
                                                    <th>Stock</th>
                                                    <th>Action</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                ${products.map(p => `
                                                    <tr>
                                                        <td>${p.name}</td>
                                                        <td class="text-orange fw-bold">RM${p.price.toLocaleString()}</td>
                                                        <td><span class="badge ${p.stock < 10 ? 'bg-danger' : 'bg-success'}">${p.stock}</span></td>
                                                        <td>
                                                            <button class="btn btn-sm btn-outline-dark me-1"><i class="fas fa-edit"></i></button>
                                                            <button class="btn btn-sm btn-outline-danger" onclick="router.deleteProduct(${p.id})"><i class="fas fa-trash"></i></button>
                                                        </td>
                                                    </tr>
                                                `).join('')}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="premium-card p-4">
                                    <h5 class="fw-bold mb-4">Add New News</h5>
                                    <form onsubmit="router.addNews(event)">
                                        <div class="mb-3">
                                            <input type="text" class="form-control" id="newsTitle" placeholder="Announcement Title" required>
                                        </div>
                                        <div class="mb-3">
                                            <textarea class="form-control" id="newsContent" rows="4" placeholder="Flash news details..." required></textarea>
                                        </div>
                                        <button class="btn btn-premium w-100">Publish Now</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            addNews: function(e) {
                e.preventDefault();
                const news = DB.get('news');
                news.unshift({
                    id: Date.now(),
                    title: document.getElementById('newsTitle').value,
                    content: document.getElementById('newsContent').value,
                    date: new Date().toLocaleDateString()
                });
                DB.set('news', news);
                App.notify('Announcement published successfully!');
                this.viewAdmin();
            },

            deleteProduct: function(id) {
                if (!confirm('Are you sure you want to remove this product?')) return;
                const products = DB.get('products').filter(p => p.id !== id);
                DB.set('products', products);
                App.notify('Product removed from inventory');
                this.viewAdmin();
            }
        };

        // --- Initialization ---
        window.addEventListener('DOMContentLoaded', () => {
            DB.init();
            App.updateNavbar();
            
            // Handle Hash Routing
            const initialPath = window.location.hash.substring(1) || '/';
            router.render(initialPath);
            
            window.addEventListener('hashchange', () => {
                const path = window.location.hash.substring(1);
                router.render(path);
            });
        });

    </script>
</body>
</html>
